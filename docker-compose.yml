services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpassword
      POSTGRES_DB: bookly
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bookuser:bookpassword@db:5432/bookly
      SECRET_KEY: your-secret-key-here
    depends_on:
      - db

volumes:
  postgres_data: